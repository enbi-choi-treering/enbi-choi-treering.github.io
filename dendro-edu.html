  <div class="redirect-page">
    <h1>Dendro-Edu</h1>
    <p>Redirecting to the Dendro-Edu educational platform…</p>
    <p id="redirect-msg"></p>
    <a id="redirect-link" href="#" class="btn btn--primary" target="_blank" rel="noopener noreferrer">Open Dendro-Edu</a>
  </div>
</main>

<script>
  (async () => {
    try {
      const res = await fetch('data/site-config.json');
      const cfg = await res.json();
      const url = cfg.dendroEduUrl;
      if (url && url !== '#') {
        document.getElementById('redirect-link').href = url;
        setTimeout(() => { window.location.href = url; }, 1500);
        document.getElementById('redirect-msg').textContent =
          'If you are not redirected automatically, click the button below.';
      }
    } catch {}
  })();
</script>
