<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>목재의 방향과 주요 3단면 · Dendro-Edu</title>
  <!-- 기존 스타일시트를 그대로 사용하여 홈화면과 동일한 레이아웃 유지 -->
  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    /* 탭 및 학습 페이지용 스타일 (레이아웃 틀은 그대로 사용) */
    .section-wrap { margin-bottom: 60px; padding: 20px; }
    .learning-grid { display: grid; grid-template-columns: 200px 1fr; gap: 30px; }
    .side-nav { display: flex; flex-direction: column; gap: 10px; }
    .nav-btn { padding: 12px; border: 1px solid #ddd; background: #fff; cursor: pointer; text-align: left; }
    .nav-btn.active { background: #34495e; color: #fff; }
    .content-box { background: #fff; padding: 30px; border: 1px solid #eee; border-radius: 8px; }
    .tab-btn { padding: 10px 20px; border: 1px solid #34495e; background: transparent; cursor: pointer; }
    .tab-btn.active { background: #34495e; color: #fff; }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
  </style>
</head>
<body>

  <!-- 홈 화면과 동일한 헤더 사용 -->
  <header class="site-header">
    <div class="header-inner">
      <a href="../../index.html" class="site-logo">🌳 Dendro<span>-Edu</span></a>
    </div>
  </header>

  <!-- 기존의 컨테이너 클래스를 그대로 사용하여 여백 자동 적용 -->
  <div class="content-layout" style="max-width: 1000px; margin: 40px auto;">
    
    <div class="header" style="margin-bottom: 40px;">
        <h1 class="sub-title">목재의 방향과 주요 3단면</h1>
        <div class="meta-info">작성자: 최은비 · 업데이트: 2026.06.20</div>
    </div>

    <!-- 섹션들 -->
    <section class="section-wrap">
      <h2>1. 목재의 구조</h2>
      <div class="learning-grid">
        <div class="side-nav">
          <button class="nav-btn active" onclick="switchContent('struct-content', '수피 내용입니다.')">수피</button>
          <button class="nav-btn" onclick="switchContent('struct-content', '형성층 내용입니다.')">형성층</button>
        </div>
        <div class="content-box" id="struct-content">항목을 선택하세요.</div>
      </div>
    </section>

    <section class="section-wrap">
      <h2>2. 침엽수와 활엽수종 원판 비교</h2>
      <div class="learning-grid">
        <div class="side-nav">
          <button class="nav-btn" onclick="switchContent('compare-content', '심재 비교...')">심재</button>
          <button class="nav-btn" onclick="switchContent('compare-content', '변재 비교...')">변재</button>
        </div>
        <div class="content-box" id="compare-content">항목을 선택하세요.</div>
      </div>
    </section>

    <section class="section-wrap">
      <h2>3. 목재의 주요 3단면</h2>
      <div class="tab-container">
        <button class="tab-btn active" onclick="showTab(this, 'ts')">횡단면</button>
        <button class="tab-btn" onclick="showTab(this, 'rs')">방사단면</button>
        <button class="tab-btn" onclick="showTab(this, 'tls')">접선단면</button>
      </div>
      <div class="content-box">
        <div id="ts" class="tab-panel active">횡단면(TS) 상세...</div>
        <div id="rs" class="tab-panel">방사단면(RS) 상세...</div>
        <div id="tls" class="tab-panel">접선단면(TLS) 상세...</div>
      </div>
    </section>
  </div>

<script>
  function switchContent(id, text) { document.getElementById(id).innerHTML = text; }
  function showTab(btn, tabId) {
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    btn.classList.add('active');
  }
</script>
</body>
</html>
