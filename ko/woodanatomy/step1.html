<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>목재의 방향과 주요 3단면 · Dendro-Edu</title>
  <style>
    /* 1. 깔끔한 배경색 및 기본 설정 */
    body { background-color: #f8f9fa; font-family: sans-serif; color: #333; line-height: 1.6; margin: 0; padding: 0; }
    .container { max-width: 800px; margin: 40px auto; padding: 40px; background: #fff; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }

    /* 3. 상단 경로 및 제목 */
    .breadcrumb { font-size: 0.9rem; color: #666; margin-bottom: 10px; }
    .main-title { font-size: 1.8rem; margin-bottom: 5px; color: #2c3e50; }
    .sub-title { font-size: 2.2rem; margin-bottom: 20px; font-weight: 800; }
    
    /* 5. 설명 및 메타 정보 */
    .meta-info { font-size: 0.9rem; color: #888; border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 30px; }

    /* 6. 탭 디자인 (학습 내용) */
    .tab-container { display: flex; gap: 10px; margin-bottom: 20px; }
    .tab-button { padding: 10px 20px; border: none; background: #eee; cursor: pointer; border-radius: 6px; }
    .tab-button.active { background: #2c3e50; color: white; }
    .content-panel { display: none; }
    .content-panel.active { display: block; }
    .img-container img { max-width: 100%; border-radius: 8px; margin-top: 15px; }
  </style>
</head>
<body>

<div class="container">
  <div class="breadcrumb">Dendro-Edu / 목재해부학 (Wood Anatomy)</div>
  <h1 class="sub-title">목재의 방향과 주요 3단면</h1>

  <div class="meta-info">
    작성자: 최은비 (En-Bi CHOI) · 업데이트: 2026.06.20
  </div>

  <div class="tab-container">
    <button class="tab-button active" onclick="showContent('ts')">횡단면 (TS)</button>
    <button class="tab-button" onclick="showContent('rs')">방사단면 (RS)</button>
    <button class="tab-button" onclick="showContent('tls')">접선단면 (TLS)</button>
  </div>

  <div id="ts" class="content-panel active">
    <h3>횡단면 (Transverse Section)</h3>
    <p>나이테를 가장 명확히 볼 수 있는 단면입니다...</p>
    <div class="img-container"><img src="ts_image.jpg" alt="횡단면"></div>
  </div>

  <div id="rs" class="content-panel">
    <h3>방사단면 (Radial Section)</h3>
    <p>중심에서 바깥쪽으로 자른 단면입니다...</p>
    <div class="img-container"><img src="rs_image.jpg" alt="방사단면"></div>
  </div>

  <div id="tls" class="content-panel">
    <h3>접선단면 (Tangential Section)</h3>
    <p>나이테와 평행하게 자른 단면입니다...</p>
    <div class="img-container"><img src="tls_image.jpg" alt="접선단면"></div>
  </div>
</div>

<script>
  function showContent(id) {
    document.querySelectorAll('.content-panel').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-button').forEach(b => b.classList.remove('active'));
    document.getElementById(id).classList.add('active');
    event.currentTarget.classList.add('active');
  }
</script>

</body>
</html>
