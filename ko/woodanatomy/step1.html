<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>목재의 방향과 주요 3단면 · Dendro-Edu</title>
  <link rel="stylesheet" href="../../assets/css/style.css">
  <style>
    /* 1. 기본 레이아웃 (홈 화면과 동일한 여백) */
    .content-layout { max-width: 1000px; margin: 40px auto; padding: 20px; }
    
    /* 2. 가로형 버튼 그룹 (자동 너비 설정) */
    .button-row { display: flex; width: 100%; gap: 5px; margin-bottom: 5px; }
    .nav-btn { flex: 1; padding: 12px; border: 1px solid #ddd; background: #fff; cursor: pointer; text-align: center; border-radius: 4px; transition: 0.3s; }
    .nav-btn.active { background: #34495e; color: #fff; border-color: #34495e; }

    /* 3. 내용 표시 하얀 박스 */
    .content-box { background: #fff; padding: 30px; border: 1px solid #eee; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); min-height: 250px; }
    .media-area img { max-width: 100%; border-radius: 8px; margin-top: 20px; display: block; }

    .section-wrap { margin-bottom: 50px; }
    .section-title { font-size: 1.4rem; color: #2c3e50; margin-bottom: 15px; border-bottom: 2px solid #eee; padding-bottom: 10px; }
  </style>
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <a href="../../index.html" class="site-logo">🌳 Dendro<span>-Edu</span></a>
    </div>
  </header>

  <div class="content-layout">
    <header style="margin-bottom: 40px;">
        <h1 class="sub-title">목재의 방향과 주요 3단면</h1>
        <div class="meta-info">작성자: 최은비 · 업데이트: 2026.06.20</div>
    </header>

    <section class="section-wrap">
      <h2 class="section-title">1. 목재의 구조</h2>
      <div class="button-row">
        <button class="nav-btn" onclick="updateContent('struct-box', '수피는 나무의 가장 바깥층으로...', 'bark.jpg')">수피</button>
        <button class="nav-btn" onclick="updateContent('struct-box', '형성층은 세포 분열이 일어나는...', 'cambium.gif')">형성층</button>
      </div>
      <div class="content-box" id="struct-box">항목을 선택하면 내용과 이미지가 나타납니다.</div>
    </section>

    <section class="section-wrap">
      <h2 class="section-title">2. 침엽수와 활엽수종 원판 비교</h2>
      <div class="button-row">
        <button class="nav-btn" onclick="updateContent('compare-box', '심재는 수분이 적고...', 'heartwood.jpg')">심재</button>
        <button class="nav-btn" onclick="updateContent('compare-box', '변재는 수분 이동이 활발하며...', 'sapwood.jpg')">변재</button>
      </div>
      <div class="content-box" id="compare-box">항목을 선택하세요.</div>
    </section>

    <section class="section-wrap">
      <h2 class="section-title">3. 목재의 주요 3단면</h2>
      <div class="button-row">
        <button class="nav-btn" onclick="updateContent('ts-box', '횡단면 설명...', 'ts_image.jpg')">횡단면</button>
        <button class="nav-btn" onclick="updateContent('ts-box', '방사단면 설명...', 'rs_image.jpg')">방사단면</button>
        <button class="nav-btn" onclick="updateContent('ts-box', '접선단면 설명...', 'tls_image.jpg')">접선단면</button>
      </div>
      <div class="content-box" id="ts-box">항목을 선택하세요.</div>
    </section>
  </div>

<script>
  function updateContent(boxId, text, mediaSrc) {
    const box = document.getElementById(boxId);
    box.innerHTML = `
      <div class="text-area">${text}</div>
      <div class="media-area"><img src="${mediaSrc}" alt="관련 자료"></div>
    `;
  }
</script>

</body>
</html>
